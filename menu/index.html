<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>معرض قوالب منيو المطاعم</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&family=Cairo:wght@600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="hero">
    <nav class="nav-bar">
      <div class="top-btns">
        <a href="/menu" class="btn-nav">
          <i class="fas fa-user"></i>
          <span>الملف الشخصي</span>
        </a>
       
      </div>
    </nav>

    <h1 class="hero-title">معرض قوالب منيو المطاعم</h1>
    <p class="hero-desc">
     تصفح أحدث التصاميم العصرية لعملك التجاري

    </p>
  </header>

  <section class="filter-box">
    <div class="search-wrapper">
      <input id="searchInput" type="text" placeholder="ابحث باسم القالب، الوصف، التاغات أو رقم القالب..." />
      <i class="fas fa-search"></i>
    </div>

    <div id="filterGroup" class="filter-group">
      <button class="f-btn active" data-cat="all">الكل</button>
      <button class="f-btn" data-cat="luxury">فخامة</button>
      <button class="f-btn" data-cat="modern">مودرن</button>
      <button class="f-btn" data-cat="romantic">رومانسي</button>
      <button class="f-btn" data-cat="simple">بسيط</button>
    </div>
  </section>

  <main class="container">
    <div id="menuGrid" class="grid"></div>
  </main>

  <!-- Modal -->
  <div id="menuModal" class="modal">
    <div class="modal-body">
      <iframe id="menuFrame" src=""></iframe>
      <button class="close-btn" onclick="closeMenu()">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
