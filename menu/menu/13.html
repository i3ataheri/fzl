<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لاونج المذاق الملكي - نيون</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --الأسود-العميق: #0a0a0a;
            --الرمادي-الناعم: #161616;
            --النيون-الأخضر: #ccff00;
            --الأبيض-الثلجي: #f5f5f5;
            --خط-العناوين: 'Cairo', sans-serif;
            --خط-النصوص: 'Tajawal', sans-serif;
        }

        html { 
            scroll-behavior: smooth; 
            overflow-x: hidden; /* جلوگیری از اسکرول افقی در سطح کل سند */
        }

        body { 
            font-family: var(--خط-النصوص); 
            margin: 0; 
            background: var(--الأسود-العميق);
            color: var(--الأبيض-الثلجي);
            padding-bottom: 120px; 
            overflow-x: hidden; /* اطمینان از عدم خروج محتوا */
            width: 100%;
            position: relative;
        }

        header {
            padding: 60px 25px 40px;
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            border-bottom: 1px solid rgba(204, 255, 0, 0.1);
            text-align: center;
        }

        .brand-name { 
            font-family: var(--خط-العناوين);
            font-size: 2.5rem; 
            font-weight: 900; 
            color: var(--النيون-الأخضر); 
            margin: 0; 
            text-shadow: 0 0 15px rgba(204, 255, 0, 0.3);
        }

        .bottom-nav {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%; /* کمی کوچک‌تر برای جلوگیری از برخورد با لبه گوشی */
            max-width: 650px;
            background: rgba(22, 22, 22, 0.98);
            backdrop-filter: blur(25px);
            display: flex;
            overflow-x: auto;
            padding: 18px 10px;
            border-radius: 35px;
            border: 1.5px solid var(--النيون-الأخضر);
            z-index: 2000;
            gap: 22px;
            scrollbar-width: none;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .bottom-nav::-webkit-scrollbar { display: none; }

        .nav-item {
            cursor: pointer;
            transition: 0.4s;
            text-align: center;
            opacity: 0.4;
            min-width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active { opacity: 1; transform: scale(1.1); color: var(--النيون-الأخضر); }
        .nav-item i { font-size: 1.8rem; margin-bottom: 6px; font-style: normal; }
        .nav-item span { font-family: var(--خط-العناوين); font-size: 0.7rem; font-weight: 700; }

        .menu-container { 
            padding: 30px 20px; 
            max-width: 900px; 
            margin: 0 auto;
            overflow: hidden; /* جلوگیری از خروج سایه تصاویر کارت‌ها */
        }
        .section { display: none; }
        .section.active { display: block; }

        .section-title {
            font-family: var(--خط-العناوين);
            color: var(--النيون-الأخضر);
            font-size: 2rem;
            margin-bottom: 50px;
            text-align: center;
        }

        .food-card {
            background: var(--الرمادي-الناعم);
            border-radius: 40px;
            margin-bottom: 55px;
            padding: 25px;
            display: flex;
            align-items: center;
            position: relative;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }

        .food-img-wrapper {
            position: absolute;
            right: -20px;
            width: 125px;
            height: 125px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--النيون-الأخضر);
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.4);
        }

        .food-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .food-details { margin-right: 120px; flex-grow: 1; }
        .food-title { font-family: var(--خط-العناوين); font-size: 1.25rem; color: white; margin: 0 0 8px 0; }
        .food-desc { font-size: 0.85rem; color: #aaa; line-height: 1.5; margin-bottom: 15px; min-height: 3em; }
        .food-price { font-family: var(--خط-العناوين); background: var(--النيون-الأخضر); color: black; padding: 5px 18px; border-radius: 15px; font-weight: 900; font-size: 1.1rem; display: inline-block; }

        .back-home {
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 60px;
            height: 60px;
            background-color: var(--النيون-الأخضر);
            color: var(--الأسود-العميق);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.4);
            z-index: 9999;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid var(--الأسود-العميق);
        }

        .back-home:hover {
            transform: translateY(-10px) scale(1.1);
            background-color: var(--الأبيض-الثلجي);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        .back-home svg { width: 30px; height: 30px; fill: currentColor; }

        @media (max-width: 600px) {
            .food-img-wrapper { width: 105px; height: 105px; right: -10px; }
            .food-details { margin-right: 105px; }
            .brand-name { font-size: 2rem; }
            .back-home { bottom: 120px; width: 55px; height: 55px; right: 15px; }
            .bottom-nav { width: 90%; padding: 15px 5px; gap: 15px; }
        }
    </style>
</head>

        function init() {
            const content = document.getElementById('menuContent');
            const nav = document.getElementById('bottomNav');
            let isFirst = true;

            for (let key in data) {
                const navItem = document.createElement('div');
                navItem.className = `nav-item ${isFirst ? 'active' : ''}`;
                navItem.onclick = () => showSection(key, navItem);
                navItem.innerHTML = `<i>${data[key].i}</i><span>${data[key].n}</span>`;
                nav.appendChild(navItem);

                const section = document.createElement('div');
                section.id = 'sec-' + key;
                section.className = `section ${isFirst ? 'active' : ''}`;
                section.innerHTML = `<h2 class="section-title" data-aos="zoom-in">${data[key].n}</h2>`;
                
                data[key].items.forEach((item, index) => {
                    section.innerHTML += `
                        <div class="food-card" data-aos="fade-right" data-aos-delay="${index * 50}">
                            <div class="food-img-wrapper">
                                <img src="${item.img}" alt="${item.t}" loading="lazy">
                            </div>
                            <div class="food-details">
                                <h3 class="food-title">${item.t}</h3>
                                <p class="food-desc">${item.d}</p>
                                <div class="food-price">${item.p} ريال</div>
                            </div>
                        </div>
                    `;
                });
                content.appendChild(section);
                isFirst = false;
            }
            AOS.init({ duration: 600, once: true });
        }

        function showSection(key, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('sec-' + key).classList.add('active');
            el.classList.add('active');
            el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            window.scrollTo({ top: 0, behavior: 'smooth' });
            AOS.refresh();
        }

        window.onload = init;
    </script>
</body>
</html>
