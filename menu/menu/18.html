<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --خلفية-الجسم: #f4f4f4;
            --خلفية-القائمة: rgba(255, 255, 255, 0.9);
            --خلفية-الكارت: #ffffff;
            --لون-النص-الرئيسي: #222222;
            --لون-النص-الوصف: #666666;
            --لون-التوهج: #D4AF37;
            --حدود-الكارت: #eeeeee;
            --عرض-مغلق: 85px;
        }

        [data-theme="dark"] {
            --خلفية-الجسم: #121212;
            --خلفية-القائمة: rgba(26, 26, 26, 0.95);
            --خلفية-الكارت: #1e1e1e;
            --لون-النص-الرئيسي: #ffffff;
            --لون-النص-الوصف: #aaaaaa;
            --لون-التوهج: #FFD700;
            --حدود-الكارت: #333333;
        }

        body { 
            margin: 0; background-color: var(--خلفية-الجسم); font-family: 'Cairo', sans-serif;
            color: var(--لون-النص-الرئيسي); display: flex; flex-direction: column; min-height: 100vh;
        }

        .floating-actions {
            position: fixed; left: 20px; bottom: 20px;
            display: flex; flex-direction: column; gap: 15px; z-index: 10001;
        }
        .f-btn {
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: none; font-size: 22px;
        }
        .cart-btn { background: #25D366; color: white; position: relative; }
        .cart-count {
            position: absolute; top: -5px; right: -5px; background: #e74c3c;
            color: white; font-size: 12px; width: 24px; height: 24px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-weight: bold; border: 2px solid white;
        }
        .theme-btn { background: var(--لون-التوهج); color: #000; }

        /* استایل پنجره سبد خرید بدون دست زدن به بقیه کد */
        #cartOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 20000; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .cart-modal {
            background: var(--خلفية-الكارت); width: 90%; max-width: 400px;
            border-radius: 20px; padding: 20px; max-height: 80vh; overflow-y: auto;
        }
        .cart-item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid var(--حدود-الكارت);
        }
        .del-btn { color: #e74c3c; cursor: pointer; font-size: 18px; }

        header {
            position: relative; height: 250px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, var(--خلفية-الجسم) 100%), 
                        url('https://images.unsplash.com/photo-1549541412-71e57c4b9857?q=80&w=735&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }

        .wrapper { display: flex; flex: 1; position: relative; }

        .edge-panel-fixed {
            position: fixed; right: 10px; top: 50%; transform: translateY(-50%);
            width: var(--عرض-مغلق); height: 85vh; max-height: 700px;
            background: var(--خلفية-القائمة); backdrop-filter: blur(15px);
            border-radius: 40px; z-index: 10000; border: 1px solid rgba(128,128,128,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }

        .scrollable-icons {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            align-items: center; padding: 10px 0; scrollbar-width: none;
            scroll-behavior: smooth;
        }
        .scrollable-icons::-webkit-scrollbar { display: none; }

        .menu-item {
            display: flex; flex-direction: column; align-items: center; width: 100%;
            padding: 12px 0; cursor: pointer; transition: 0.3s; flex-shrink: 0;
        }
        
        .menu-item span { 
            font-size: 14px; color: var(--لون-النص-الوصف); 
            margin-top: 5px; font-weight: bold; font-family: 'Tajawal'; 
        }
        
        .icon-circle { 
            width: 50px; height: 50px; background: rgba(128,128,128,0.1); 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; font-size: 22px; border: 2px solid transparent;
        }
        
        .menu-item.active .icon-circle { 
            background: rgba(212, 175, 55, 0.2); border-color: var(--لون-التوهج);
        }
        .menu-item.active span { color: var(--لون-التوهج); }

        .main-container { flex-grow: 1; margin-right: 100px; padding: 40px; }
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .food-card { 
            background: var(--خلفية-الكارت); border-radius: 20px; overflow: hidden; 
            border: 1px solid var(--حدود-الكارت); display: flex; flex-direction: column;
        }
        .food-card img { width: 100%; height: 200px; object-fit: cover; }
        .food-info { padding: 18px; display: flex; flex-direction: column; flex-grow: 1; }
        .price { color: var(--لون-التوهج); font-weight: bold; font-size: 1.2rem; }

        .add-btn {
            background: var(--لون-التوهج); border: none; padding: 12px; border-radius: 12px;
            font-family: 'Cairo'; font-weight: bold; cursor: pointer; margin-top: auto;
            display: flex; align-items: center; justify-content: center; gap: 8px; color: #000;
        }

        @media (max-width: 768px) {
            .main-container { margin-right: 90px; padding: 15px; }
            .food-grid { grid-template-columns: 1fr !important; }
            .edge-panel-fixed { width: 75px; height: 80vh; }
            .menu-item span { font-size: 12px; }
        }
    </style>
</head>
<body data-theme="light">

    <div id="cartOverlay" onclick="closeCart()">
        <div class="cart-modal" onclick="event.stopPropagation()">
            <h3 style="text-align:center; color:var(--لون-التوهج)">سلتك الحالية</h3>
            <div id="cartItemsList"></div>
            <div id="cartTotal" style="margin-top:20px; font-weight:bold; border-top:2px solid var(--لون-التوهج); padding-top:10px;"></div>
            <button onclick="finalizeWhatsApp()" class="add-btn" style="width:100%; margin-top:15px; background:#25D366; color:white;">
                تأكيد وإرسال للواتساب <i class="fab fa-whatsapp"></i>
            </button>
            <button onclick="closeCart()" style="width:100%; margin-top:10px; background:none; border:none; color:var(--لون-النص-الوصف); cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <div class="floating-actions">
        <button class="f-btn theme-btn" onclick="toggleTheme()"><i id="theme-icon" class="fas fa-moon"></i></button>
        <button class="f-btn cart-btn" onclick="openCart()">
            <i class="fas fa-shopping-basket"></i>
            <span class="cart-count" id="cartBadge">0</span>
        </button>
    </div>

    <header>
        <h1>رويا ديزاین</h1>
        <p>نكهة النار والأصالة</p>
    </header>

    <div class="wrapper">
        <div class="edge-panel-fixed">
            <div class="scrollable-icons" id="menuContainer">
                <div class="menu-item active" onclick="updateUI('مشاوي', this)"><div class="icon-circle">🍖</div><span>مشاوي</span></div>
                <div class="menu-item" onclick="updateUI('بيتزا', this)"><div class="icon-circle">🍕</div><span>بيتزا</span></div>
                <div class="menu-item" onclick="updateUI('برجر', this)"><div class="icon-circle">🍔</div><span>برجر</span></div>
                <div class="menu-item" onclick="updateUI('سلطات', this)"><div class="icon-circle">🥗</div><span>سلطات</span></div>
                <div class="menu-item" onclick="updateUI('باستا', this)"><div class="icon-circle">🍝</div><span>باستا</span></div>
                <div class="menu-item" onclick="updateUI('سوشي', this)"><div class="icon-circle">🍣</div><span>سوشي</span></div>
                <div class="menu-item" onclick="updateUI('عصائر', this)"><div class="icon-circle">🥤</div><span>عصائر</span></div>
                <div class="menu-item" onclick="updateUI('حلى', this)"><div class="icon-circle">🍰</div><span>حلى</span></div>
                <div class="menu-item" onclick="updateUI('قهوة', this)"><div class="icon-circle">☕</div><span>قهوة</span></div>
                <div class="menu-item" onclick="updateUI('مقبلات', this)"><div class="icon-circle">🍟</div><span>مقبلات</span></div>
            </div>
        </div>

        <div class="main-container">
            <h2 id="catName" style="color: var(--لون-التوهج); border-right: 4px solid var(--لون-التوهج); padding-right: 15px; margin-bottom: 30px;">مشاوي</h2>
            <div class="food-grid" id="foodGrid"></div>
        </div>
    </div>

    <script>
        let shoppingCart = [];

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
            } else {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-moon';
            }
        }

        const fullData = {
            "مشاوي": [
                {n: "كباب لحم", p: 45, d: "لحم بقري طازج مشوي."},
                {n: "شيش طاووق", p: 38, d: "صدور دجاج متبلة."},
                {n: "ریش غنم", p: 65, d: "ریش غنم مشوية على الفحم."},
                {n: "مشكل مشاوي", p: 80, d: "تشكيلة من كباب ودجاج وريش."}
            ],
            "بيتزا": [
                {n: "مارغريتا", p: 30, d: "صوص طماطم وجبن موزاريلا."},
                {n: "بيتزا خضار", p: 35, d: "فلفل، زيتون، فطر، ذرة."},
                {n: "بيبروني", p: 42, d: "شرائح ببروني بقري وجبن."},
                {n: "بيتزا رانش", p: 48, d: "دجاج بصوص الرانش المميز."}
            ],
            "برجر": [
                {n: "كلاسيك برجر", p: 32, d: "لحم مشوي، خس، طماطم."},
                {n: "تشيز برجر", p: 36, d: "لحم مع طبقة جبن شيدر."},
                {n: "برجر دجاج", p: 30, d: "صدر دجاج مقرمش."},
                {n: "دبل برجر", p: 48, d: "قطعتين لحم مع صوص خاص."}
            ],
            "سلطات": [
                {n: "سلطة يونانية", p: 25, d: "خيار، طماطم، جبن فيتا."},
                {n: "سيزر دجاج", p: 32, d: "خس، دجاج مشوي، صوص سيزر."},
                {n: "تبولة", p: 20, d: "بقدونس، برغل، ليمون."},
                {n: "فتوش", p: 22, d: "خضار متنوعة مع خبز مقلي."}
            ],
            "باستا": [
                {n: "فيتوتشيني", p: 45, d: "باستا بالكريمة والدجاج."},
                {n: "بنيه أرابياتا", p: 38, d: "باستا بصوص طماطم حار."},
                {n: "لازانيا لحم", p: 50, d: "طبقات مكرونة باللحم والجبن."}
            ],
            "سوشي": [
                {n: "كاليفورنیا رول", p: 55, d: "كراب، أفوكادو، خيار."},
                {n: "سلمون مكي", p: 60, d: "سلمون طازج مع أرز."},
                {n: "تمبورا رول", p: 65, d: "روبيان مقرمش."}
            ],
            "عصائر": [
                {n: "عصير برتقال", p: 15, d: "عصير طازج بارد."},
                {n: "لیمون نعناع", p: 18, d: "منعش وطبیعی."},
                {n: "كوكتيل فواكه", p: 22, d: "تشكيلة فواكه الموسم."},
                {n: "عصير رمان", p: 20, d: "طبیعی 100%."}
            ],
            "حلى": [
                {n: "تشیز كيك", p: 28, d: "فراولة أو لوتس."},
                {n: "مولتن كيك", p: 32, d: "كيك شوكولاتة ذائبة."},
                {n: "براونيز", p: 25, d: "شوكولاتة غنية مع آيس كريم."}
            ],
            "قهوة": [
                {n: "إسبريسو", p: 12, d: "قهوة مركزة."},
                {n: "كابتشينو", p: 18, d: "رغوة غنیة مع حلیب."},
                {n: "لاتیه حار", p: 20, d: "حلیب وقهوة مختصة."},
                {n: "آیس سبانش", p: 24, d: "قهوة باردة محلاة."}
            ],
            "مقبلات": [
                {n: "بطاطس مقلية", p: 12, d: "مقرمشة وذهبیة."},
                {n: "حلقات بصل", p: 15, d: "مقرمشة مع صوص."},
                {n: "حمص بالزیت", p: 18, d: "حمص كريمي بزيت زیتون."},
                {n: "ورق عنب", p: 22, d: "محشو بخلطة الأرز."}
            ]
        };

        function updateUI(cat, element) {
            const container = document.getElementById('menuContainer');
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            
            const offsetTop = element.offsetTop;
            const containerHeight = container.clientHeight;
            const itemHeight = element.clientHeight;
            container.scrollTo({
                top: offsetTop - (containerHeight / 2) + (itemHeight / 2),
                behavior: 'smooth'
            });

            document.getElementById('catName').innerText = cat;
            const grid = document.getElementById('foodGrid');
            grid.innerHTML = "";
            const items = fullData[cat] || []; 
            items.forEach((item, i) => {
                grid.innerHTML += `
                    <div class="food-card">
                        <img src="https://picsum.photos/500/350?random=${cat}${i}" alt="food">
                        <div class="food-info">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <h3>${item.n}</h3>
                                <span class="price">${item.p} ر.س</span>
                            </div>
                            <p style="font-size:13px; color:var(--لون-النص-الوصف);">${item.d}</p>
                            <button class="add-btn" onclick="addToCart('${item.n}', ${item.p})">
                                <i class="fas fa-plus-circle"></i> إضافة للطلب
                            </button>
                        </div>
                    </div>`;
            });
        }

        function addToCart(name, price) {
            shoppingCart.push({name, price});
            document.getElementById('cartBadge').innerText = shoppingCart.length;
        }

        // توابع جدید برای سبد خرید
        function openCart() {
            if (shoppingCart.length === 0) { alert("السلة فارغة!"); return; }
            const list = document.getElementById('cartItemsList');
            list.innerHTML = "";
            let total = 0;
            shoppingCart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div class="cart-item-row">
                        <span>${item.name} (${item.price} ر.س)</span>
                        <i class="fas fa-trash del-btn" onclick="removeFromCart(${index})"></i>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = "الإجمالي: " + total + " ر.س";
            document.getElementById('cartOverlay').style.display = "flex";
        }

        function closeCart() {
            document.getElementById('cartOverlay').style.display = "none";
        }

        function removeFromCart(index) {
            shoppingCart.splice(index, 1);
            document.getElementById('cartBadge').innerText = shoppingCart.length;
            if (shoppingCart.length === 0) {
                closeCart();
            } else {
                openCart();
            }
        }

        function finalizeWhatsApp() {
            let message = "مرحباً رويا ديزاين، أريد طلب الآتي:\n----------------------------\n";
            let total = 0;
            shoppingCart.forEach((item, index) => {
                message += `${index + 1}- ${item.name} (${item.price} ر.س)\n`;
                total += item.price;
            });
            message += `----------------------------\nالإجمالي: ${total} ر.س`;
            const finalLink = `https://wa.me/966548471318?text=${encodeURIComponent(message)}`;
            window.open(finalLink, '_blank');
        }

        window.onload = () => updateUI('مشاوي', document.querySelector('.menu-item'));
    </script>
</body>
</html>
