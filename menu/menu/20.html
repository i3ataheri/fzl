<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مذاق الرفاهية الكامل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Lalezar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --الأخضر: #1B5E20;
            --الذهبي: #C5A059;
            --الرملي: #F9F7F2;
            --الخط_الرئيسي: 'Cairo', sans-serif;
            --الخط_العناوين: 'Lalezar', cursive;
        }

        body { 
            font-family: var(--الخط_الرئيسي); 
            background-color: var(--الرملي); 
            margin: 0; 
            overflow-x: hidden;
            color: #333;
        }

        /* الهيدر */
        .header-canvas {
            height: 220px;
            background: var(--الأخضر);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0 0 50% 50% / 0 0 20% 20%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header-canvas h1 {
            font-family: var(--الخط_العناوين);
            font-size: 3.5rem;
            color: var(--الذهبي);
            margin: 0;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
        }

        /* المنيو العلوي المنزلق */
        .orbit-nav {
            display: flex;
            justify-content: center;
            overflow-x: auto;
            gap: 15px;
            padding: 20px 10px;
            scrollbar-width: none;
            margin-top: -45px;
            position: relative;
            z-index: 100;
        }
        
        @media (max-width: 900px) { .orbit-nav { justify-content: flex-start; } }
        .orbit-nav::-webkit-scrollbar { display: none; }

        .orbit-item {
            flex: 0 0 85px;
            height: 85px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: 0.4s ease;
        }

        .orbit-item i { font-size: 1.6rem; color: var(--الأخضر); margin-bottom: 4px; }
        .orbit-item span { font-size: 0.7rem; font-weight: 700; color: #666; }

        .orbit-item.active {
            background: var(--الذهبي);
            transform: scale(1.1) translateY(-5px);
            border: 2px solid white;
        }
        .orbit-item.active i, .orbit-item.active span { color: white; }

        /* الجريد (الشبكة) */
        .menu-grid {
            max-width: 1100px;
            margin: 30px auto 100px;
            padding: 0 15px;
        }

        .category-view { 
            display: none; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
        }

        .category-view.active { display: grid; animation: fadeIn 0.5s ease-out; }

        .neo-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            transition: 0.3s;
        }

        .neo-card:hover { transform: translateY(-5px); }

        .neo-img {
            width: 100%;
            height: 150px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .neo-body h3 { margin: 0 0 5px; font-size: 1.1rem; color: var(--الأخضر); font-weight: 900; }
        .neo-body p { margin: 0 0 12px; font-size: 0.75rem; color: #777; line-height: 1.4; height: 35px; overflow: hidden; }

        .neo-price {
            background: #f1f8e9;
            color: var(--الأخضر);
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 0.9rem;
            border: 1px dashed var(--الذهبي);
            align-self: center;
        }

        @media (max-width: 992px) { .category-view { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .category-view { gap: 12px; } .neo-img { height: 120px; } }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .home-orbit {
            position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px;
            background: var(--الأخضر); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: var(--الذهبي);
            z-index: 1000; border: 2px solid var(--الذهبي);
        }
    </style>
</head>
<body>

    <div class="orbit-item" onclick="changeTab('desserts', this)"><i class="fas fa-cookie-bite"></i><span>الحلويات</span></div>
    <div class="orbit-item" onclick="changeTab('drinks', this)"><i class="fas fa-glass-cheers"></i><span>المشروبات</span></div>

    function renderMenu() {
        const grid = document.getElementById('menu-target');
        for (let cat in menuData) {
            let view = document.createElement('div');
            view.id = cat;
            view.className = `category-view ${cat === 'fatair' ? 'active' : ''}`;
            menuData[cat].forEach(item => {
                view.innerHTML += `
                    <div class="neo-card">
                        <img src="${item.img}" class="neo-img" alt="${item.t}">
                        <div class="neo-body">
                            <h3>${item.t}</h3>
                            <p>${item.d}</p>
                            <span class="neo-price">${item.p} ريال</span>
                        </div>
                    </div>
                `;
            });
            grid.appendChild(view);
        }
    }

    function changeTab(id, el) {
        document.querySelectorAll('.category-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.orbit-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    renderMenu();
</script>

</html>
